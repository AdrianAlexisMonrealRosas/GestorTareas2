{% extends "base.html" %}

{% block title %}Mis Tareas{% endblock %}

{% block content %}

<div class="container mt-5 pt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📝 Mis Tareas</h2>

        <a href="/logout" class="btn btn-outline-danger">
            Cerrar sesión
        </a>
    </div>

    <div class="card p-3 mb-4 shadow-sm">
        <form id="taskForm">
            <div class="input-group">
                <input 
                    type="text" 
                    id="taskInput"
                    class="form-control" 
                    placeholder="Escribe una nueva tarea..."
                    required
                >

                <button class="btn btn-primary" type="submit">
                    Agregar
                </button>
            </div>
        </form>
    </div>

    <div class="mb-3 d-flex gap-2">
        <button class="btn btn-outline-primary btn-sm filter-btn" data-filter="all">
            Todas
        </button>

        <button class="btn btn-outline-warning btn-sm filter-btn" data-filter="pending">
            Pendientes
        </button>

        <button class="btn btn-outline-success btn-sm filter-btn" data-filter="completed">
            Completadas
        </button>
    </div>

    <div class="row g-3" id="taskList"></div>

</div>

<script>

    const taskForm = document.getElementById("taskForm");
    const taskInput = document.getElementById("taskInput");
    const taskList = document.getElementById("taskList");

    let tasks = [
        {
            text: "Hacer tarea de matemáticas",
            completed: false
        },
        {
            text: "Ir al gimnasio",
            completed: true
        },
        {
            text: "Estudiar Flask",
            completed: false
        }
    ];

    let currentFilter = "all";

    function renderTasks() {

        taskList.innerHTML = "";

        let filteredTasks = tasks;

        if (currentFilter === "pending") {
            filteredTasks = tasks.filter(task => !task.completed);
        }

        if (currentFilter === "completed") {
            filteredTasks = tasks.filter(task => task.completed);
        }

        filteredTasks.forEach((task, index) => {

            const col = document.createElement("div");
            col.className = "col-md-6";

            col.innerHTML = `
                <div class="card shadow-sm border-start border-4 ${
                    task.completed ? "border-success" : "border-primary"
                }">

                    <div class="card-body d-flex justify-content-between align-items-center">

                        <div>
                            <h5 class="mb-1 ${
                                task.completed
                                    ? "text-decoration-line-through text-muted"
                                    : ""
                            }">
                                ${task.text}
                            </h5>

                            <small class="${
                                task.completed
                                    ? "text-success"
                                    : "text-warning"
                            }">

                                ${
                                    task.completed
                                        ? "Completada"
                                        : "Pendiente"
                                }

                            </small>
                        </div>

                        <div class="d-flex gap-2">

                            <button 
                                class="btn btn-sm ${
                                    task.completed
                                        ? "btn-secondary"
                                        : "btn-success"
                                }"
                                onclick="toggleTask(${index})"
                            >
                                ${
                                    task.completed
                                        ? "↩"
                                        : "✔"
                                }
                            </button>

                            <button 
                                class="btn btn-danger btn-sm"
                                onclick="deleteTask(${index})"
                            >
                                🗑
                            </button>

                        </div>

                    </div>

                </div>
            `;

            taskList.appendChild(col);

        });

    }

    taskForm.addEventListener("submit", function(e) {

        e.preventDefault();

        const text = taskInput.value.trim();

        if (text === "") return;

        tasks.push({
            text: text,
            completed: false
        });

        taskInput.value = "";

        renderTasks();

    });

    function toggleTask(index) {
        tasks[index].completed = !tasks[index].completed;
        renderTasks();
    }

    function deleteTask(index) {
        tasks.splice(index, 1);
        renderTasks();
    }

    const filterButtons = document.querySelectorAll(".filter-btn");

    filterButtons.forEach(button => {

        button.addEventListener("click", function() {

            currentFilter = this.dataset.filter;

            renderTasks();

        });

    });

    renderTasks();

</script>

{% endblock %}
