{% extends "base.html" %}

{% block title %}Mis Tareas{% endblock %}

{% block content %}

<div class="container mt-5 pt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📝 Mis Tareas</h2>

        <a href="/logout" class="btn btn-outline-danger">
            Cerrar sesión
        </a>
    </div>

    <div class="card p-3 mb-4 shadow-sm">
        <form id="taskForm">
            <div class="input-group">
                <input 
                    type="text" 
                    id="taskInput"
                    class="form-control" 
                    placeholder="Escribe una nueva tarea..."
                    required
                >

                <button class="btn btn-primary" type="submit">
                    Agregar
                </button>
            </div>
        </form>
    </div>

    <div class="mb-3 d-flex gap-2">
        <button class="btn btn-outline-primary btn-sm filter-btn" data-filter="all">
            Todas
        </button>

        <button class="btn btn-outline-warning btn-sm filter-btn" data-filter="pending">
            Pendientes
        </button>

        <button class="btn btn-outline-info btn-sm filter-btn" data-filter="process">
            En proceso
        </button>

        <button class="btn btn-outline-success btn-sm filter-btn" data-filter="completed">
            Completadas
        </button>
    </div>

    <div class="row g-3" id="taskList"></div>

</div>

<script>

    const taskForm = document.getElementById("taskForm");
    const taskInput = document.getElementById("taskInput");
    const taskList = document.getElementById("taskList");

    let tasks = [
        {
            text: "Hacer tarea de matemáticas",
            status: "pending"
        },
        {
            text: "Ir al gimnasio",
            status: "completed"
        },
        {
            text: "Estudiar Flask",
            status: "process"
        }
    ];

    let currentFilter = "all";

    function renderTasks() {

        taskList.innerHTML = "";

        let filteredTasks = tasks;

        if (currentFilter !== "all") {
            filteredTasks = tasks.filter(task => task.status === currentFilter);
        }

        filteredTasks.forEach((task, index) => {

            let borderColor = "border-primary";
            let textColor = "text-warning";
            let statusText = "Pendiente";
            let titleClass = "";

            if (task.status === "process") {
                borderColor = "border-info";
                textColor = "text-info";
                statusText = "En proceso";
            }

            if (task.status === "completed") {
                borderColor = "border-success";
                textColor = "text-success";
                statusText = "Completada";
                titleClass = "text-decoration-line-through text-muted";
            }

            const col = document.createElement("div");
            col.className = "col-md-6";

            col.innerHTML = `
                <div class="card shadow-sm border-start border-4 ${borderColor}">

                    <div class="card-body d-flex justify-content-between align-items-center">

                        <div>
                            <h5 class="mb-1 ${titleClass}">
                                ${task.text}
                            </h5>

                            <small class="${textColor}">
                                ${statusText}
                            </small>
                        </div>

                        <div class="d-flex gap-2">

                            <button 
                                class="btn btn-warning btn-sm"
                                onclick="changeStatus(${index}, 'pending')"
                            >
                                ⏳
                            </button>

                            <button 
                                class="btn btn-info btn-sm"
                                onclick="changeStatus(${index}, 'process')"
                            >
                                🔄
                            </button>

                            <button 
                                class="btn btn-success btn-sm"
                                onclick="changeStatus(${index}, 'completed')"
                            >
                                ✔
                            </button>

                            <button 
                                class="btn btn-danger btn-sm"
                                onclick="deleteTask(${index})"
                            >
                                🗑
                            </button>

                        </div>

                    </div>

                </div>
            `;

            taskList.appendChild(col);

        });

    }

    taskForm.addEventListener("submit", function(e) {

        e.preventDefault();

        const text = taskInput.value.trim();

        if (text === "") return;

        tasks.push({
            text: text,
            status: "pending"
        });

        taskInput.value = "";

        renderTasks();

    });

    function changeStatus(index, status) {
        tasks[index].status = status;
        renderTasks();
    }

    function deleteTask(index) {
        tasks.splice(index, 1);
        renderTasks();
    }

    const filterButtons = document.querySelectorAll(".filter-btn");

    filterButtons.forEach(button => {

        button.addEventListener("click", function() {

            currentFilter = this.dataset.filter;

            renderTasks();

        });

    });

    renderTasks();

</script>

{% endblock %}
