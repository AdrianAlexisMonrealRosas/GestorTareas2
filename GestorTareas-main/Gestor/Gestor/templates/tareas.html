{% extends "base.html" %}

{% block title %}Mis Tareas{% endblock %}

{% block content %}

<div class="container mt-5 pt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📝 Mis Tareas</h2>
        <a href="/logout" class="btn btn-outline-danger">Cerrar sesión</a>
    </div>

    <div class="card p-3 mb-4 shadow-sm">
        <form>
            <div class="input-group">
                <input type="text" class="form-control" placeholder="Escribe una nueva tarea...">
                <button class="btn btn-primary">Agregar</button>
            </div>
        </form>
    </div>

    <div class="mb-3">
        <button class="btn btn-outline-primary btn-sm">Todas</button>
        <button class="btn btn-outline-warning btn-sm">Pendientes</button>
        <button class="btn btn-outline-success btn-sm">Completadas</button>
    </div>

    <div class="row g-3">

        <div class="col-md-6">
            <div class="card shadow-sm border-start border-4 border-primary">
                <div class="card-body d-flex justify-content-between align-items-center">
                    
                    <div>
                        <h5 class="mb-1">Hacer tarea de matemáticas</h5>
                        <small class="text-muted">Pendiente</small>
                    </div>

                    <div>
                        <button class="btn btn-success btn-sm">✔</button>
                        <button class="btn btn-danger btn-sm">🗑</button>
                    </div>

                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-sm border-start border-4 border-success">
                <div class="card-body d-flex justify-content-between align-items-center">
                    
                    <div>
                        <h5 class="mb-1 text-decoration-line-through text-muted">
                            Ir al gimnasio
                        </h5>
                        <small class="text-success">Completada</small>
                    </div>

                    <div>
                        <button class="btn btn-secondary btn-sm">↩</button>
                        <button class="btn btn-danger btn-sm">🗑</button>
                    </div>

                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-sm border-start border-4 border-warning">
                <div class="card-body d-flex justify-content-between align-items-center">
                    
                    <div>
                        <h5 class="mb-1">Estudiar Flask</h5>
                        <small class="text-warning">En progreso</small>
                    </div>

                    <div>
                        <button class="btn btn-success btn-sm">✔</button>
                        <button class="btn btn-danger btn-sm">🗑</button>
                    </div>

                </div>
            </div>
        </div>

    </div>

</div>

{% endblock %}
